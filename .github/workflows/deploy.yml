name: Deploy website

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Download code
        uses: actions/checkout@v3

      - name: Deploy a GitHub Pages
        uses: actions/upload-pages-artifact@v4
        with:
          path: .

      - name: Publish to GitHub Pages
        uses: actions/deploy-pages@v1
