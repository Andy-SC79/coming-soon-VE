- title: "Piel Joven"
  copy: "Disminuye arrugas, hidrata e ilumina tu rostro aportando firmeza y elasticidad a la piel."
  src: "piel-joven"

- title: "Articulaciones Fuertes"
  copy: "El colágeno apoya la estructura de los huesos, y el magnesio mejora la absorción de calcio y la función muscular."
  src: "articulaciones-fuertes"

- title: "Cabello Abundante"
  copy: "Al nutrir el cuero cabelludo, el colágeno ayuda a que el cabello crezca más fuerte y sano, y el magnesio contribuye a que se vea saludable y brillante."
  src: "cabello-abundante"

- title: "Flexibilidad Articular"
  copy: "El colágeno regenera el cartílago de las articulaciones, mientras que el magnesio reduce la rigidez muscular, mejorando flexibilidad y movilidad."
  src: "flexibilidad-articular"

- title: "Uñas Resistentes"
  copy: "Repara la queratina, proporcionando rigidez a las uñas y ayudándolas a crecer de manera saludable."
  src: "unas-resistentes"

- title: "Repara Tejidos"
  copy: "El colágeno acelera la recuperación de lesiones reconstruyendo tejidos, mientras que el magnesio alivia malestar muscular, favoreciendo una sanación rápida."
  src: "reparacion-tejidos"

- title: "Salud Intestinal"
  copy: "Fortalece y protege el sistema digestivo, mientras que el magnesio facilita una digestión adecuada y ayuda a mantener la regularidad, equilibrando tu organismo."
