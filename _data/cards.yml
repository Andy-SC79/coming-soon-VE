- title: "Protege tu Corazón"
  copy: "El colágeno fortalece los vasos sanguíneos, y el magnesio equilibra la presión arterial, juntos promueven la salud cardiovascular."
  src: "corazon-sano"

- title: "Menos Fatiga"
  copy: "El magnesio combate el cansancio físico y mental, mientras el colágeno apoya la salud general, ayudando a mantenerte con energía durante el día."
  src: "menos-fatiga"

- title: "Sueño Reparador"
  copy: "El magnesio relaja el sistema nervioso, mejora el sueño y reduce la ansiedad, junto con el colágeno, promueven un descanso reparador para despertar renovado"
  src: "sueno-reparador"

- title: "Mente Lucida"
  copy: "El magnesio aporta claridad y reduce el cansancio, mejorando la concentración para tus actividades diarias."
  src: "mente-lucida"

- title: "Recuperación Muscular"
  copy: "El colágeno acelera la recuperación post-ejercicio, regenerando tejidos y reduciendo inflamación para volver a entrenar rápidamente."
  src: "recuperacion-muscular"