- title: "Política de Devoluciones de Vital Energy Shop"
  description: "¡Bienvenido a Vital Energy Shop! Valoramos tu satisfacción con cada compra y queremos asegurarnos de que estés completamente satisfecho con nuestros productos. Por favor, encuentra a continuación nuestra política de devoluciones, diseñada para hacer el proceso simple y claro para ti."

- title: "Proceso de Devolución"
  description: "Para cualquier devolución, contáctanos dentro de los 10 días siguientes a la fecha de entrega. Comunícate con nosotros a través de WhatsApp al número (+57) 333 265 3017 o por correo electrónico a shop.vitalenergy@gmail.com. Proporciona los detalles de tu pedido para que podamos asistirte de la mejor manera y, en caso necesario, adjunta evidencias fotográficas."

- title: "Condiciones para la Devolución"
  description: "Los productos deben ser devueltos en su condición original, sin uso y en su empaque original. Asegúrate de realizar la devolución dentro de los primeros 10 días posteriores a la entrega."

- title: "Costos Asociados"
  description: "Los costos de envío asociados con la devolución del producto serán cubiertos por el cliente. Antes de proceder, contáctanos para confirmar los detalles específicos de la devolución y garantizar una asistencia eficaz."

- title: "Reembolsos y Cambios"
  description: "Una vez recibido y revisado el producto devuelto, procederemos a realizar un reembolso al mismo medio de pago utilizado en la compra. Para pagos en efectivo, proporciona los datos de una cuenta de ahorros o billetera electrónica a tu nombre para la transferencia de dinero. En situaciones donde prefieras un cambio, lo coordinaremos contigo de acuerdo a tus necesidades."

- title: "Productos Dañados o Incorrectos"
  description: "Nos esforzamos por ofrecer productos de alta calidad, pero si recibes un producto dañado, incorrecto, incompleto o diferente al solicitado, por favor informa cualquier inconformidad en las primeras 48 horas luego de la recepción del pedido para iniciar una reclamación."

- title: "Tiempo de Reclamación"
  description: "Es fundamental reportar cualquier anomalía dentro de las primeras 48 horas después de recibir tu pedido. Las reclamaciones posteriores a este plazo estarán sujetas a revisión por nuestro equipo para garantizar una resolución justa y oportuna."

- title: "Responsabilidad"
  description: "Vital Energy Shop hará todo lo posible para asistirte en tus reclamaciones. No obstante, la decisión final respecto al cubrimiento de garantías estará sujeta a las políticas de la transportadora o del proveedor. Agradecemos tu comprensión y cooperación en este proceso."

- title: "Exclusiones"
  description: "Algunos productos, como alimentos o suplementos dietarios, podrían estar exentos de devolución si se ha retirado el sello de seguridad. Estas exclusiones estarán claramente especificadas en la página del producto."

- title: "Nota Importante"
  description: "Nuestra política de devoluciones cumple con las regulaciones comerciales en Colombia y tiene como objetivo proteger y garantizar tus derechos como consumidor. Si tienes alguna consulta adicional, ¡no dudes en comunicarte con nosotros! Estamos aquí para ayudarte."