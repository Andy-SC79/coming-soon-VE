- title: "¿Qué es el colágeno?"
  answer: 'El colágeno es una proteína que se encuentra en nuestro cuerpo y es como el "pegamento" que mantiene unidas nuestras células, tejidos y órganos. Es crucial para la estructura, fuerza y flexibilidad de nuestra piel, huesos, articulaciones y músculos.'

- title: "¿Cuál es la diferencia entre colágeno y colágeno hidrolizado?"
  answer: "El colágeno hidrolizado es una forma procesada de colágeno en la que las largas cadenas de proteínas se dividen en fragmentos más pequeños, llamados péptidos. Esto hace que el colágeno hidrolizado sea un 90% más fácil de absorber por nuestro cuerpo, lo que lo convierte en un suplemento nutricional esencial."

- title: "¿A partir de qué edad es recomendable empezar a tomar colágeno?"
  answer: "La suplementación con colágeno normalmente se recomienda a partir de los 30 años, pero también puede ser usada más temprano por personas que pasan mucho tiempo expuestas al sol, que fuman o que tienen una dieta poco saludable, ya que estos factores empeoran la salud de la piel, estimulan el envejecimiento y pueden afectar la producción de colágeno en el organismo."

- title: "¿En cuánto tiempo veo resultados?"
  answer: "Cada organismo reacciona de manera distinta. Algunos reportan mejoras visibles en tan solo 5 días, mientras que otros pueden tardar un poco más. En áreas como el cabello o la piel, los resultados pueden demorar, ya que la nutrición comienza a actuar internamente antes de que se refleje en el exterior."

- title: "¿Cuánto dura un tarro?"
  answer: "Su consumo recomendado es de 2 veces al día, un tarro suele 
                    durar aproximadamente 45 días.(Contiene 180 g)."

