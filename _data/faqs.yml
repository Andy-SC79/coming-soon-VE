- title: "¿Qué pasa si suspendo el consumo de colágeno?"
  answer: "Si se deja de tomar por más de 15 días consecutivos, se pierden los efectos favorables de su consumo. Además, recuerda que se requiere de un mínimo de tres meses para poder apreciar resultados duraderos en tu organismo."

  