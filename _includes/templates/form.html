<div class="min-h-screen w-full lg:w-1/2 mx-auto">
    <div class="px-6 py-12 bg-white border-0 shadow-lg sm:rounded-3xl rounded-lg">
      <h1 class="text-2xl text-azul font-bold m-2">Datos de Envío</h1>
      <!-- <p class="text-gris text-3x1 mb-8">Colágeno Hidrolizado con Citrato de Magnesio, Extractos Mágicos x 180gr.</p> -->


      <form class="max-w-md mx-auto" id="form" method="post">
        <div class="mb-5 flex flex-col md:flex-row gap-3">
          <input type="text" name="nombres" autocomplete="given-name" class="input-field border border-gray-300 text-gray-900 text-sm block w-1/2 p-2.5" placeholder="Nombres" required />
          <input type="text" name="apellidos" placeholder="Apellidos" required class="input-field w-1/2" />
        </div>

        <div class="mb-5 w-full flex">
          <select id="countryCode" name="indicativoPais" class="input-field w-1/4">
            <option value="+57" selected>🇨🇴 +57</option>
            <option value="+58">🇻🇪 +58</option>
            <option value="+593">🇪🇨 +593</option>
            <option value="+52">🇲🇽 +52</option>
            <option value="+1">🇺🇸 +1</option>
            <option value="+56">🇨🇱 +56</option>
            <option value="+51">🇵🇪 +51</option>
            <option value="+54">🇦🇷 +54</option>
            <option value="+55">🇧🇷 +55</option>
          </select>

          <input type="text" name="whatsapp" inputmode="numeric" pattern="[0-9]*" placeholder="WhatsApp" autocomplete="tel" class="input-field w-full" minlength="10" maxlength="10" required />
      </div>

        <div class="relative z-0 w-full mb-5">
          <input
            type="tel"
            name="numeroAlternativo"
            autocomplete="tel"
            placeholder="Número alternativo de contacto"
            class="pt-3 pb-2 block w-full px-0 mt-0 bg-transparent border-0 border-b-2 focus:outline-none focus:ring-0 focus:border-black border-gray-200"
          />
        </div>
  
        <!-- Dropdown de Departamentos-->
        <div class="relative z-0 w-full mb-5 flex">
          <select id="departamento" name="departamento" required class="w-full min-w-0 input-field z-10 bg-gray-500 border border-gray-300 text-gray-300 text-sm focus:ring-blue-500 focus:border-blue-500 block w-1/2 p-2.5">
            <option value="" disabled selected class="text-gris">Departamento<sup class="text-azul">*</sup></option>
            {% for departamento in site.data.departamentos %}
              <option value="{{ departamento.nombre }}">{{ departamento.nombre }}</option>
            {% endfor %}
          </select>

        <!-- Dropdown de Ciudades-->
          <select id="ciudad" name="ciudad" required class="w-full min-w-0 input-field z-10 bg-gray-500 border border-gray-300 text-gray-900 text-sm focus:ring-blue-500 focus:border-blue-500 block w-1/2 p-2.5">
            <option value="" disabled selected>Ciudad<sup class="text-azul">*</sup></option>
          </select>
        </div>

        <div class="relative z-0 w-full mb-5">
          <label for="direccion" class="absolute duration-300 top-3 -z-1 origin-0 block mb-2 text-sm font-medium text-gray-900 dark:text-white">Dirección de envío:<sup class="text-azul">*</sup></label>
          <span class="text-sm text-red-600 hidden" id="error">Este campo es obligatorio</span>
          <input
            type="address"
            name="direccion"
            placeholder="Ingrese una dirección completa y valida"
            class="pb-2 block w-full px-0 mt-0 bg-transparent border-0 border-b-2 appearance-none focus:outline-none focus:ring-0 focus:border-black border-gray-200"
            required
            />
        </div>

        <div>
          <label for="small-input" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Notas para el proveedor o la transportadora</label>
          <input type="text" id="small-input" name="notas" class="block w-full p-2 text-gray-900 border border-gray-300 rounded-lg bg-gray-50 text-xs focus:ring-blue-500 focus:border-blue-500 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500">
      </div>

        <!-- email -->
        <div class="relative z-0 w-full mb-5">
          <input
            type="email"
            id="email"
            name="email"
            inputmode="email"
            autocomplete="email"
            placeholder="Correo electrónico"
            class="pt-3 pb-2 block w-full px-0 mt-0 bg-transparent border-b-2 appearance-none focus:outline-none focus:ring-0 focus:border-black border-gray-500"
            required
          />
        </div>
        <p id="errorEmail" class="text-lila text-sm mt-1 hidden">Por favor, ingresa un correo válido.</p>

  
        <fieldset class="relative z-0 w-full p-px mb-5">
          <legend class="absolute text-gray-500 transform scale-75 -top-3 origin-0">Método de pago</legend>
          <div class="block pt-3 pb-2 space-x-4">
            <label>
              <input
                type="radio"
                name="metodoPago"
                class="mr-2 text-black border-2 border-gray-300 focus:border-gray-300 focus:ring-black"
                value="Tarjeta"
              />
              Pago Con Tarjeta
            </label>
            <label>
              <input
                type="radio"
                name="metodoPago"
                class="mr-2 text-black border-2 border-gray-300 focus:border-gray-300 focus:ring-black"
                checked="checked"
                value="Contraentrega"
            />
              Pago Contraentrega
            </label>
          </div>
        </fieldset>

        <input
        id="producto"
        type="text"
        name="producto"
        value="Colágeno con Magnesio"
        class="hidden"
        required
        />

        <div class="relative z-0 w-full mb-5">
          <select
            id="ofertaSelect"
            name="oferta"
            value="0"
            onclick="this.setAttribute('value', this.value);"
            class="pt-3 pb-2 block w-full px-0 mt-0 bg-transparent border-0 border-b-2 appearance-none z-1 focus:outline-none focus:ring-0 focus:border-black border-gray-200"
            onchange="actualizarTotal()"
            required
          >
            <option value="" selected disabled>Selecciona una oferta</option>
            <option value="77000">1 und x $77.000</option>
            <option value="115000">2 und x $115.000</option>
            <option value="154000">3 und x $154.000</option>
            <!-- <option value="195000">4 und x $195.000</option> -->
            <option value="231000">5 und x $231.000</option>
          </select>
        </div>        

        <p id="totalPagar" class="text-azul font-bold mb-4">Total a Pagar: $0</p>

        <input
        id="valorAPagar"
        type="number"
        name="valorAPagar"
        value=""
        class="hidden"
        required
        />
          
        <button
          id="button"
          type="submit"
          class="w-full px-6 py-3 mt-3 mb-4 text-lg text-white bg-azul rounded hover:bg-verde transition-all duration-150 ease-linear rounded-lg shadow outline-none bg-blue hover:via-violet hover:shadow-lg focus:outline-none"
        >
          <span id="btnText">Confirmar Pedido</span>
          <span id="btnLoader" class="hidden"><i class="fa fa-spinner fa-spin"></i> Enviando...</span>
          </button>
        <p id="formMessage" class="text-center text-sm mt-3 hidden"></p>
      </form>
      </div>
  </div>
  <section><iframe src="https://drive.google.com/file/d/1DNB1_DPkkS6RqcAXj_nw-wHx4HmyroRH/preview" class="w-full hidden max-w-xl mx-auto aspect-video" allow="autoplay"></iframe></section>

  <script>
    function mostrarMensaje(texto, tipo = "error") {
    const msg = document.getElementById("formMessage");

    msg.textContent = texto;
    msg.classList.remove("hidden");

    if (tipo === "error") {
        msg.classList.add("text-red-500");
        msg.classList.remove("text-green-500");
    } else {
        msg.classList.add("text-green-500");
        msg.classList.remove("text-red-500");
    }
}
  </script>



<!-- asigna el valor a pagar segun la oferta seleccionada -->
<script>
  function actualizarTotal() {
    // Obtiene el elemento ofertaSelect
    const select = document.getElementById('ofertaSelect');
    // Obtiene el valor seleccionado
    const valorSeleccionado = select.value;
    const formatted = Number(valorSeleccionado).toLocaleString('es-CO');
    // Actualiza el texto del total a pagar
    const totalPagarElement = document.getElementById('totalPagar');
    // totalPagarElement.textContent = `Total a Pagar: $${valorSeleccionado || 0}`;
    totalPagarElement.textContent = `Total a Pagar: $${formatted}`;
    const valorAPagar = document.getElementById('valorAPagar');
    valorAPagar.value = valorSeleccionado;
  }

const whatsappInput = document.querySelector('input[name="whatsapp"]');

whatsappInput.addEventListener('input', function(){

    this.value = this.value.replace(/\D/g, '');

    if(this.value.length > 10){
        this.value = this.value.slice(0,10);
    }

});
</script>

<script>
  document.addEventListener("DOMContentLoaded", function() {
    const departamentos = {{ site.data.departamentos | jsonify }};
    const departamentoSelect = document.getElementById('departamento');
    const ciudadSelect = document.getElementById('ciudad');

    function updateCiudades() {
      const selectedDepartamento = departamentoSelect.value;
      const selectedData = departamentos.find(dep => dep.nombre === selectedDepartamento);

      if (selectedData) {
        ciudadSelect.innerHTML = '<option value="" disabled selected>Ciudad<sup class="text-azul">*</sup></option>';
        selectedData.ciudades.forEach(ciudad => {
          const option = document.createElement('option');
          option.value = ciudad.nombre;
          option.textContent = ciudad.nombre;
          ciudadSelect.appendChild(option);
        });
      }
    }

    // Inicializar ciudades basadas en el primer valor por defecto del dropdown de departamentos.
    updateCiudades();

    // Agregar evento de cambio para actualizar ciudades basadas en selección del usuario.
    departamentoSelect.addEventListener('change', updateCiudades);
  });
</script>

<!-- validacion correo -->

<script>
  document.getElementById('email').addEventListener('blur', validarCorreo);

  function validarCorreo() {
    const emailInput = document.getElementById('email');
    const errorEmail = document.getElementById('errorEmail');
    const email = emailInput.value.trim();

    // Expresión regular para validar el formato del correo electrónico
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    if (!emailRegex.test(email)) {
      errorEmail.textContent = 'Por favor, ingresa un correo válido.';
      errorEmail.classList.remove('hidden'); // Muestra el mensaje de error
      emailInput.classList.add('border-lila'); // Opcional: resalta el borde en lila
      emailInput.classList.remove('border-gris'); // Remueve el borde original
    } else {
      errorEmail.classList.add('hidden'); // Oculta el mensaje de error si es válido
      emailInput.classList.remove('border-lila'); // Quita el borde lila
      emailInput.classList.add('border-gris'); // Restaura el borde original
    }
  }
</script>

<script>
// Get modal elements
var formModal = document.getElementById('formModal');
var confirmationModal = document.getElementById('confirmationModal');

// Get the <span> element that closes the modal
var spans = document.getElementsByClassName('close');

document.querySelectorAll('.openModalBtn').forEach(button => {
    button.addEventListener('click', function() {
        // Código para abrir el modal
        document.getElementById('formModal').style.display = 'block';
    });
});


// When the user clicks on <span> (x), close the modal
for (let span of spans) {
    span.onclick = function() {
        formModal.style.display = 'none';
        confirmationModal.style.display = 'none';
    }
}


</script>

<script> // Handle form submission
  
document.getElementById("form").addEventListener("submit", async function(e){

    e.preventDefault();

    const form = this;

    // Validación HTML nativa
    if (!form.checkValidity()) {

        form.reportValidity(); 
        return;

    }

    // 🔽 OBTENER DATOS
const countryCode = form.querySelector('#countryCode').value;
let whatsapp = form.querySelector('input[name="whatsapp"]').value.trim();

// limpiar (solo números)
whatsapp = whatsapp.replace(/\D/g, '');

const input = form.querySelector('input[name="whatsapp"]');

// 🔴 VALIDACIÓN SIMPLE
let isValid = false;

if (countryCode === "+57") {
    // Colombia
    isValid = /^3\d{9}$/.test(whatsapp);
} else {
    // Otros países
    isValid = /^\d{10}$/.test(whatsapp);
}

if (!isValid) {
    input.classList.add("border-red-500");
    input.focus();

    alert(
        countryCode === "+57"
        ? "Ingresa un número válido para Colombia"
        : "Ingresa un número válido de WhatsApp"
    );

    return;
}

input.classList.remove("border-red-500");

// NORMALIZAR (opcional pero recomendado)
//const numeroCompleto = countryCode + whatsapp;

// si lo envías al backend
const formData = new FormData(form);
formData.set("whatsapp", whatsapp);

    const btn = document.getElementById("button");
    const btnText = document.getElementById("btnText");
    const btnLoader = document.getElementById("btnLoader");

    // activar loading
    btn.disabled = true;
    btnText.classList.add("hidden");
    btnLoader.classList.remove("hidden");


    try {

        const response = await fetch(
        "https://script.google.com/macros/s/AKfycbxPrTUP-jqdec6vZO7dE8vLOhjPfpdHpyjN8P22lNuayN5qEmSSkjtUgSMTwP-02l07/exec",
        {
            method: "POST",
            body: formData
        });

        // desactivar loading
        btn.disabled = false;
        btnText.classList.remove("hidden");
        btnLoader.classList.add("hidden");

        alert("Pedido enviado correctamente. En breve te contactaremos por WhatsApp.");

        form.reset();

        // Cerrar modal
        const formModal = document.getElementById('formModal');

        if (formModal) {
        formModal.style.display = 'none';
        }

        document.body.style.overflow = 'auto';

    } catch(error) {

        alert("Error enviando el pedido. Intenta nuevamente.");
        console.error(error);

    }

});  
</script>
