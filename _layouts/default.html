<!doctype html>
{% assign s_col="#00ABC7" %}
<html lang="en">
  <head>
{% include templates/meta_tags.html %} 

<link rel="apple-touch-icon" sizes="180x180" href="assets/favicon/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="assets/favicon/favicon-16x16.png">
<link rel="manifest" href="assets/favicon/site.webmanifest">
<link rel="mask-icon" href="assets/favicon/safari-pinned-tab.svg" color="#f3cfc6">
<meta name="msapplication-TileColor" content="#f3cfc6">
<meta name="theme-color" content="#ffffff">

<meta property="og:image" content="assets/images/logo.png">
<meta property="og:image:alt" content="Logo Vital Energy">
<meta property="og:title" content="Disfruta lo que te mereces | {{ site.title }}">
<meta property="og:description" content="{{ site.description }}">
<meta property="og:type" content="image">
<meta property="og:site_name" content="{{ site.title }}">
<meta property="og:locale:alternate" content="es_ES">
<meta name="geo.placename" content="Colombia">
<meta name="geo.region" content="CO">

    <title>
    {{ site.title }}
    </title>

    <!-- Boostrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">

  </head>

  <body class="bg-overlay bg-video bg-gradient">

      <video autoplay muted loop id="bg-palm-trees">
        <source src="/assets/videos/mountain.mp4" type="video/mp4">
      </video>

    {{ content }}
	
    </div><!-- /main container -->
    <div clas="cearfix no-gutter"></div>
    
    
    <!-- Boostrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>

</html>
