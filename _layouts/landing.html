<!-- Swiper slider -->
    <script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
          const testimonialSwiper = new Swiper('.testimonial-swiper', {
            loop: true,
            spaceBetween: 10,
            navigation: {
              nextEl: '.swiper-button-next',
              prevEl: '.swiper-button-prev',
            },
            pagination: {
              el: '.swiper-pagination',
              clickable: true,
            },
            autoplay: {
              delay: 5000, // Tiempo de cada slide en milisegundos
              disableOnInteraction: false,
            },
            //slidesPerView: 1, // Muestra una imagen a la vez
            breakpoints: {
              300: {
                slidesPerView: 1,
              },
              640: {  // For screens >= 640px, show 2 slides
                slidesPerView: 2,
              },
              1024: {  // For screens >= 1024px, show 3 slides
                slidesPerView: 3,
              },
            },
          });
        });

    </script>
    <script type="text/javascript">
    document.addEventListener("DOMContentLoaded", function () {
      let currentSlide = 0;
      const slides = document.querySelectorAll(".testimonial-slide");
      const totalSlides = slides.length;

      document.querySelector(".next").addEventListener("click", () => {
        currentSlide = (currentSlide + 1) % totalSlides;
        updateSlidePosition();
      });

      document.querySelector(".prev").addEventListener("click", () => {
        currentSlide = (currentSlide - 1 + totalSlides) % totalSlides;
        updateSlidePosition();
      });

      function updateSlidePosition() {
        const sliderContainer = document.querySelector(".slider-container");
        sliderContainer.style.transform = `translateX(-${currentSlide * 100}%)`;
      }
    });
    </script>

    <script>

});

<!-- Cards animation -->
    <script>
    document.addEventListener("DOMContentLoaded", function () {
      const cards = document.querySelectorAll(".slider .card");
      let currentIndex = 0;

      function nextSlide() {
          // Remover clase activa de la card actual
          cards[currentIndex].classList.remove("active");

          // Avanzar al siguiente índice
          currentIndex = (currentIndex + 1) % cards.length;

          // Agregar clase activa a la nueva card
          cards[currentIndex].classList.add("active");

          // Mover el slider
          const offset = -currentIndex * 320; // Ancho de la card más el gap
          document.querySelector(".slider").style.transform = translateX(${offset}px);
      }

      // Iniciar el slider en loop
      setInterval(nextSlide, 2000); // Cambia cada 2 segundos
    });
    </script>
